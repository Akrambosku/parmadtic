{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PARMADTIC Spaceman{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'game/style.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <style>
        /* Auth page shared styles */
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            position: relative;
            overflow: hidden;
        }
        .stars-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .stars-bg::before, .stars-bg::after {
            content: '';
            position: absolute;
            width: 2px; height: 2px;
            background: transparent;
            border-radius: 50%;
        }
        .auth-card {
            position: relative; z-index: 2;
            background: rgba(11, 12, 16, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 105, 148, 0.4);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 0 60px rgba(0, 105, 148, 0.2), 0 20px 40px rgba(0,0,0,0.5);
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .auth-logo h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 2rem;
            background: linear-gradient(135deg, #006994, #00c6ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
            margin: 0;
        }
        .auth-logo p { color: rgba(255,255,255,0.4); font-size: 0.8rem; margin-top: 4px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: rgba(255,255,255,0.6); font-size: 0.85rem; margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; }
        .form-group input {
            width: 100%; padding: 14px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0,105,148,0.3);
            border-radius: 10px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            box-sizing: border-box;
        }
        .form-group input:focus {
            border-color: #006994;
            box-shadow: 0 0 0 3px rgba(0,105,148,0.15);
        }
        .btn-auth {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #005f85, #006994);
            border: none; border-radius: 10px;
            color: #fff; font-family: 'Outfit', sans-serif;
            font-size: 1rem; font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase;
            cursor: pointer; transition: all 0.3s;
            margin-top: 8px;
        }
        .btn-auth:hover {
            background: linear-gradient(135deg, #006994, #00a8d6);
            box-shadow: 0 0 20px rgba(0,105,148,0.5);
            transform: translateY(-1px);
        }
        .auth-link { text-align: center; margin-top: 20px; color: rgba(255,255,255,0.5); font-size: 0.9rem; }
        .auth-link a { color: #00c6ff; text-decoration: none; font-weight: 600; }
        .auth-link a:hover { text-decoration: underline; }
        .error-msg {
            background: rgba(255, 77, 77, 0.12);
            border: 1px solid rgba(255, 77, 77, 0.4);
            color: #ff6b6b;
            padding: 12px 16px; border-radius: 8px;
            margin-bottom: 20px; font-size: 0.9rem;
        }

        /* Dashboard styles */
        .dashboard-layout { display: grid; grid-template-rows: auto 1fr; min-height: 100vh; }
        .dash-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 32px;
            background: rgba(0,0,0,0.6);
            border-bottom: 1px solid rgba(0,105,148,0.3);
            position: sticky; top: 0; z-index: 100;
            backdrop-filter: blur(10px);
        }
        .dash-header .brand { font-weight: 800; font-size: 1.3rem; color: #fff; letter-spacing: 3px; }
        .dash-nav { display: flex; gap: 8px; align-items: center; }
        .dash-nav a {
            padding: 8px 16px; border-radius: 8px;
            color: rgba(255,255,255,0.7); text-decoration: none;
            font-size: 0.85rem; font-weight: 500;
            transition: all 0.2s; border: 1px solid transparent;
        }
        .dash-nav a:hover, .dash-nav a.active { background: rgba(0,105,148,0.2); border-color: rgba(0,105,148,0.4); color: #fff; }
        .dash-nav a.logout { color: #ff6b6b; }
        .dash-nav a.logout:hover { background: rgba(255,77,77,0.1); border-color: rgba(255,77,77,0.3); }
        .dash-balance-pill {
            background: rgba(0,105,148,0.2); border: 1px solid rgba(0,105,148,0.4);
            border-radius: 20px; padding: 8px 20px;
            color: #00c6ff; font-weight: 700; font-size: 1rem;
        }

        .dash-content { padding: 32px; max-width: 1100px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        .dash-tabs { display: flex; gap: 4px; margin-bottom: 28px; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 4px; }
        .dash-tab {
            flex: 1; padding: 10px; text-align: center;
            background: none; border: none; color: rgba(255,255,255,0.5);
            font-family: 'Outfit', sans-serif; font-size: 0.9rem; font-weight: 500;
            border-radius: 8px; cursor: pointer; transition: all 0.2s;
        }
        .dash-tab.active { background: rgba(0,105,148,0.3); color: #fff; }
        .dash-tab:hover:not(.active) { color: rgba(255,255,255,0.8); }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        .panel-card {
            background: rgba(11,12,16,0.8); border: 1px solid rgba(0,105,148,0.25);
            border-radius: 16px; padding: 28px;
            backdrop-filter: blur(10px);
        }
        .panel-card h3 { margin: 0 0 20px; color: #fff; font-weight: 700; font-size: 1.1rem; }

        .amount-input-row { display: flex; gap: 12px; }
        .amount-input-row input {
            flex: 1; padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0,105,148,0.3);
            border-radius: 10px; color: #fff;
            font-family: 'Outfit', sans-serif; font-size: 1rem; outline: none;
            transition: border-color 0.3s;
        }
        .amount-input-row input:focus { border-color: #006994; }
        .btn-action {
            padding: 12px 24px; border-radius: 10px; border: none;
            font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 0.9rem;
            letter-spacing: 1px; cursor: pointer; transition: all 0.2s;
        }
        .btn-deposit { background: linear-gradient(135deg, #005f85, #006994); color: #fff; }
        .btn-deposit:hover { box-shadow: 0 0 16px rgba(0,105,148,0.5); transform: translateY(-1px); }
        .btn-withdraw { background: linear-gradient(135deg, #4a0080, #7b00d4); color: #fff; }
        .btn-withdraw:hover { box-shadow: 0 0 16px rgba(123,0,212,0.5); transform: translateY(-1px); }
        .btn-ticket { background: linear-gradient(135deg, #005f40, #00994d); color: #fff; width: 100%; margin-top: 12px; padding: 12px; }
        .btn-ticket:hover { box-shadow: 0 0 16px rgba(0,153,77,0.4); transform: translateY(-1px); }

        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; font-size: 0.75rem; padding: 10px 14px; text-align: left; border-bottom: 1px solid rgba(0,105,148,0.2); }
        td { padding: 12px 14px; color: rgba(255,255,255,0.85); border-bottom: 1px solid rgba(255,255,255,0.05); }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(0,105,148,0.05); }
        .badge {
            display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600;
        }
        .badge-approved { background: rgba(46,204,113,0.15); color: #2ecc71; border: 1px solid rgba(46,204,113,0.3); }
        .badge-pending { background: rgba(241,196,15,0.15); color: #f1c40f; border: 1px solid rgba(241,196,15,0.3); }
        .badge-rejected { background: rgba(231,76,60,0.15); color: #e74c3c; border: 1px solid rgba(231,76,60,0.3); }
        .badge-open { background: rgba(0,105,148,0.15); color: #00c6ff; border: 1px solid rgba(0,105,148,0.3); }
        .badge-closed { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.4); border: 1px solid rgba(255,255,255,0.1); }
        .empty-state { text-align: center; padding: 40px; color: rgba(255,255,255,0.3); font-size: 0.9rem; }

        .ticket-form textarea {
            width: 100%; padding: 12px 16px; margin-top: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0,105,148,0.3);
            border-radius: 10px; color: #fff;
            font-family: 'Outfit', sans-serif; font-size: 0.95rem;
            outline: none; resize: vertical; min-height: 100px;
            transition: border-color 0.3s; box-sizing: border-box;
        }
        .ticket-form textarea:focus { border-color: #006994; }
        .ticket-form input {
            width: 100%; padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0,105,148,0.3);
            border-radius: 10px; color: #fff;
            font-family: 'Outfit', sans-serif; font-size: 0.95rem;
            outline: none; transition: border-color 0.3s; box-sizing: border-box;
        }
        .ticket-form input:focus { border-color: #006994; }
        .form-label { display: block; color: rgba(255,255,255,0.5); font-size: 0.8rem; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; margin-top: 14px; }
        .success-toast {
            position: fixed; bottom: 32px; right: 32px;
            background: rgba(46,204,113,0.15);
            border: 1px solid rgba(46,204,113,0.4);
            color: #2ecc71; padding: 14px 24px;
            border-radius: 10px; font-weight: 600;
            backdrop-filter: blur(10px);
            animation: slideUp 0.3s ease; z-index: 999;
        }
        .error-toast {
            position: fixed; bottom: 32px; right: 32px;
            background: rgba(231,76,60,0.15);
            border: 1px solid rgba(231,76,60,0.4);
            color: #e74c3c; padding: 14px 24px;
            border-radius: 10px; font-weight: 600;
            backdrop-filter: blur(10px);
            animation: slideUp 0.3s ease; z-index: 999;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
{% block content %}{% endblock %}
</body>
</html>

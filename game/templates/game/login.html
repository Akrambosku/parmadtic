{% extends 'game/base.html' %}
{% block title %}Login - PARMADTIC{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <h1>PARMADTIC</h1>
            <p>Spaceman Game Platform</p>
        </div>
        {% if error %}<div class="error-msg">{{ error }}</div>{% endif %}
        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Masukkan username" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Masukkan password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-auth">Masuk</button>
        </form>
        <div class="auth-link">Belum punya akun? <a href="{% url 'register' %}">Daftar Sekarang</a></div>
    </div>
</div>
{% endblock %}
